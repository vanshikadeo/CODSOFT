<!DOCTYPE html>
<!--
  Modern Yellow Calculator
  Author: Internship Project
  Description: A premium, responsive calculator built with HTML5, CSS3,
  and a minimal amount of JavaScript for the calculation logic.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunburst Calculator | Modern Yellow Aesthetic</title>

    <!-- Google Fonts: Poppins, Outfit, Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Outfit:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Our stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Animated yellow gradient background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- ============ HEADER ============ -->
    <header class="site-header">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">Sunburst</span>
      </div>
      <h1 class="header-title">Modern Calculator</h1>
      <p class="header-subtitle">A premium yellow aesthetic · built with HTML &amp; CSS</p>
    </header>

    <!-- ============ MAIN: CALCULATOR ============ -->
    <main class="main">
      <section class="calculator" aria-label="Calculator">
        <!-- Display area -->
        <div class="display">
          <div class="display-expression" id="expression">0</div>
          <div class="display-result" id="result">0</div>
        </div>

        <!-- Button grid (CSS Grid layout) -->
        <div class="buttons">
          <button class="btn btn-action" data-action="clear">AC</button>
          <button class="btn btn-action" data-action="delete">DEL</button>
          <button class="btn btn-operator" data-value="%">%</button>
          <button class="btn btn-operator" data-value="/">÷</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn btn-operator" data-value="*">×</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn btn-operator" data-value="-">−</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn btn-operator" data-value="+">+</button>

          <button class="btn btn-zero" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn btn-equals" data-action="equals">=</button>
        </div>
      </section>
    </main>

    <!-- ============ FOOTER ============ -->
    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Sunburst Calculator · Crafted for my Web Development Internship</p>
    </footer>

    <!-- Minimal JS for calculator logic -->
    <script src="script.js"></script>
  </body>
</html>
